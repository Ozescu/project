{% extends 'base.html' %}
{% block content %}
<div class="section">
  <div class="form-card">
    <h2>Modifier mon profil</h2>
    <p class="form-subtitle">Mettez a jour vos informations personnelles.</p>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-grid">
        {% for field in form %}
          <div class="field-block">
            {{ field.label_tag }}
            {{ field }}
            {% for error in field.errors %}<div class="field-error">{{ error }}</div>{% endfor %}
          </div>
        {% endfor %}
      </div>
      <div class="form-actions sticky">
        <button class="button" type="submit">Enregistrer</button>
        <a class="button secondary" href="{% url 'accounts:profile' %}">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
